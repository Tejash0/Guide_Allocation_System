<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.10"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.10"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.10"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="url(#bgGrad)"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.15"/>
  </pattern>
  <rect width="1100" height="820" fill="url(#grid)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9" letter-spacing="1">Guide Allocation System — Architecture</text>
  <text x="550" y="62" text-anchor="middle" font-size="12" fill="#64748b">Full-Stack Web Application · React + Express + SQLite</text>
  <line x1="60" y1="74" x2="1040" y2="74" stroke="#334155" stroke-width="1"/>

  <!-- ═══════════════ LAYER 1: CLIENT BROWSER ═══════════════ -->
  <rect x="30" y="88" width="1040" height="200" rx="12" fill="url(#frontendGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="88" width="220" height="28" rx="8" fill="#1d4ed8" opacity="0.7"/>
  <text x="46" y="107" font-size="12" font-weight="700" fill="#bfdbfe" letter-spacing="1">CLIENT — React SPA (Vite · port 5173)</text>

  <!-- Pages group -->
  <rect x="46" y="126" width="580" height="148" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="58" y="144" font-size="11" font-weight="600" fill="#93c5fd">Pages / Routes</text>

  <!-- Page boxes -->
  <rect x="58" y="152" width="100" height="48" rx="6" fill="#1d4ed8" opacity="0.6"/>
  <text x="108" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#dbeafe">Login</text>
  <text x="108" y="184" text-anchor="middle" font-size="9" fill="#93c5fd">/login</text>
  <text x="108" y="196" text-anchor="middle" font-size="8" fill="#60a5fa">AuthLayout</text>

  <rect x="168" y="152" width="100" height="48" rx="6" fill="#1d4ed8" opacity="0.6"/>
  <text x="218" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#dbeafe">Student Reg.</text>
  <text x="218" y="184" text-anchor="middle" font-size="9" fill="#93c5fd">/register/student</text>
  <text x="218" y="196" text-anchor="middle" font-size="8" fill="#60a5fa">AuthLayout</text>

  <rect x="278" y="152" width="100" height="48" rx="6" fill="#1d4ed8" opacity="0.6"/>
  <text x="328" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#dbeafe">Faculty Reg.</text>
  <text x="328" y="184" text-anchor="middle" font-size="9" fill="#93c5fd">/register/faculty</text>
  <text x="328" y="196" text-anchor="middle" font-size="8" fill="#60a5fa">AuthLayout</text>

  <rect x="388" y="152" width="108" height="48" rx="6" fill="#1d4ed8" opacity="0.6"/>
  <text x="442" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#dbeafe">Dashboard</text>
  <text x="442" y="184" text-anchor="middle" font-size="9" fill="#93c5fd">/dashboard</text>
  <text x="442" y="196" text-anchor="middle" font-size="8" fill="#60a5fa">ProtectedRoute</text>

  <rect x="506" y="152" width="108" height="48" rx="6" fill="#1d4ed8" opacity="0.6"/>
  <text x="560" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#dbeafe">Admin</text>
  <text x="560" y="184" text-anchor="middle" font-size="9" fill="#93c5fd">/admin</text>
  <text x="560" y="196" text-anchor="middle" font-size="8" fill="#60a5fa">ProtectedRoute</text>

  <!-- Components sub-row -->
  <text x="58" y="218" font-size="10" fill="#64748b">Components:</text>
  <rect x="130" y="206" width="110" height="24" rx="4" fill="#0f3460" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="185" y="222" text-anchor="middle" font-size="9" fill="#93c5fd">ErrorBoundary</text>
  <rect x="250" y="206" width="110" height="24" rx="4" fill="#0f3460" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="305" y="222" text-anchor="middle" font-size="9" fill="#93c5fd">ProtectedRoute</text>
  <rect x="370" y="206" width="120" height="24" rx="4" fill="#0f3460" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="430" y="222" text-anchor="middle" font-size="9" fill="#93c5fd">AuthLayout (wrapper)</text>

  <!-- State -->
  <text x="58" y="252" font-size="10" fill="#64748b">State:</text>
  <rect x="100" y="240" width="170" height="24" rx="4" fill="#0f3460" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="185" y="256" text-anchor="middle" font-size="9" fill="#fde68a">localStorage · JWT token + role</text>
  <rect x="280" y="240" width="130" height="24" rx="4" fill="#0f3460" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="345" y="256" text-anchor="middle" font-size="9" fill="#fde68a">React useState (local)</text>

  <!-- API clients group -->
  <rect x="646" y="126" width="408" height="148" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="658" y="144" font-size="11" font-weight="600" fill="#93c5fd">API Client Layer  (/src/api/)</text>

  <rect x="658" y="152" width="90" height="42" rx="5" fill="#0c2340" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="703" y="168" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">apiClient.js</text>
  <text x="703" y="181" text-anchor="middle" font-size="8" fill="#60a5fa">apiFetch()</text>
  <text x="703" y="192" text-anchor="middle" font-size="7.5" fill="#475569">token inject</text>

  <rect x="758" y="152" width="76" height="42" rx="5" fill="#0c2340" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="796" y="168" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">auth.js</text>
  <text x="796" y="181" text-anchor="middle" font-size="8" fill="#60a5fa">login/register</text>

  <rect x="844" y="152" width="76" height="42" rx="5" fill="#0c2340" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="882" y="168" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">student.js</text>
  <text x="882" y="181" text-anchor="middle" font-size="8" fill="#60a5fa">guides/profile</text>

  <rect x="930" y="152" width="76" height="42" rx="5" fill="#0c2340" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="968" y="168" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">faculty.js</text>
  <text x="968" y="181" text-anchor="middle" font-size="8" fill="#60a5fa">profile/notifs</text>

  <rect x="658" y="204" width="90" height="42" rx="5" fill="#0c2340" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="703" y="220" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">requests.js</text>
  <text x="703" y="233" text-anchor="middle" font-size="8" fill="#60a5fa">send/withdraw</text>
  <text x="703" y="244" text-anchor="middle" font-size="7.5" fill="#475569">accept/reject</text>

  <rect x="758" y="204" width="76" height="42" rx="5" fill="#0c2340" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="796" y="220" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">admin.js</text>
  <text x="796" y="233" text-anchor="middle" font-size="8" fill="#60a5fa">approve/manage</text>

  <!-- ═══════════════ HTTP LAYER ═══════════════ -->
  <rect x="30" y="308" width="1040" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="332" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">HTTP / REST — JSON  ·  CORS (origin: http://localhost:5173)  ·  Authorization: Bearer &lt;JWT&gt;</text>
  <text x="550" y="352" text-anchor="middle" font-size="10" fill="#475569">GET  POST  PATCH  DELETE  →  Base URL: http://localhost:3001/api</text>

  <!-- Arrows client to HTTP -->
  <line x1="550" y1="290" x2="550" y2="308" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-dasharray="4,2"/>
  <line x1="550" y1="364" x2="550" y2="382" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-dasharray="4,2"/>

  <!-- ═══════════════ LAYER 2: BACKEND ═══════════════ -->
  <rect x="30" y="382" width="1040" height="240" rx="12" fill="url(#backendGrad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="382" width="260" height="28" rx="8" fill="#059669" opacity="0.7"/>
  <text x="46" y="401" font-size="12" font-weight="700" fill="#d1fae5" letter-spacing="1">SERVER — Node.js · Express (port 3001)</text>

  <!-- Middleware box -->
  <rect x="46" y="420" width="210" height="100" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="151" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">Middleware</text>
  <rect x="58" y="446" width="186" height="26" rx="4" fill="#065f46" stroke="#10b981" stroke-width="0.8"/>
  <text x="151" y="463" text-anchor="middle" font-size="9" font-weight="600" fill="#a7f3d0">requireAuth.js</text>
  <text x="58" y="481" font-size="8.5" fill="#6ee7b7">  · Verify JWT (jsonwebtoken)</text>
  <text x="58" y="494" font-size="8.5" fill="#6ee7b7">  · Attach req.user {id, role}</text>
  <text x="58" y="507" font-size="8.5" fill="#6ee7b7">  · Reject 401 if invalid/missing</text>

  <!-- Express router box -->
  <rect x="276" y="420" width="774" height="100" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="663" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">Express Router — Route Handlers</text>

  <rect x="288" y="446" width="126" height="64" rx="5" fill="#065f46" stroke="#34d399" stroke-width="0.8"/>
  <text x="351" y="462" text-anchor="middle" font-size="9" font-weight="700" fill="#a7f3d0">/api (auth)</text>
  <text x="351" y="476" text-anchor="middle" font-size="8" fill="#6ee7b7">POST /login</text>
  <text x="351" y="488" text-anchor="middle" font-size="8" fill="#6ee7b7">POST /register/student</text>
  <text x="351" y="500" text-anchor="middle" font-size="8" fill="#6ee7b7">POST /register/faculty</text>

  <rect x="424" y="446" width="126" height="64" rx="5" fill="#065f46" stroke="#34d399" stroke-width="0.8"/>
  <text x="487" y="462" text-anchor="middle" font-size="9" font-weight="700" fill="#a7f3d0">/api/student</text>
  <text x="487" y="476" text-anchor="middle" font-size="8" fill="#6ee7b7">GET /guides</text>
  <text x="487" y="488" text-anchor="middle" font-size="8" fill="#6ee7b7">GET/PATCH /profile</text>
  <text x="487" y="500" text-anchor="middle" font-size="8" fill="#6ee7b7">GET /notifications</text>

  <rect x="560" y="446" width="126" height="64" rx="5" fill="#065f46" stroke="#34d399" stroke-width="0.8"/>
  <text x="623" y="462" text-anchor="middle" font-size="9" font-weight="700" fill="#a7f3d0">/api/faculty</text>
  <text x="623" y="476" text-anchor="middle" font-size="8" fill="#6ee7b7">GET /profile</text>
  <text x="623" y="488" text-anchor="middle" font-size="8" fill="#6ee7b7">GET /notifications</text>
  <text x="623" y="500" text-anchor="middle" font-size="8" fill="#6ee7b7">PATCH /capacity</text>

  <rect x="696" y="446" width="162" height="64" rx="5" fill="#065f46" stroke="#34d399" stroke-width="0.8"/>
  <text x="777" y="462" text-anchor="middle" font-size="9" font-weight="700" fill="#a7f3d0">/api/requests</text>
  <text x="777" y="476" text-anchor="middle" font-size="8" fill="#6ee7b7">POST /  (send request)</text>
  <text x="777" y="488" text-anchor="middle" font-size="8" fill="#6ee7b7">GET /my  · GET /incoming</text>
  <text x="777" y="500" text-anchor="middle" font-size="8" fill="#6ee7b7">PATCH /:id/status  · DELETE /:id</text>

  <rect x="868" y="446" width="170" height="64" rx="5" fill="#065f46" stroke="#34d399" stroke-width="0.8"/>
  <text x="953" y="462" text-anchor="middle" font-size="9" font-weight="700" fill="#a7f3d0">/api/admin</text>
  <text x="953" y="476" text-anchor="middle" font-size="8" fill="#6ee7b7">GET /faculty (pending list)</text>
  <text x="953" y="488" text-anchor="middle" font-size="8" fill="#6ee7b7">PATCH /faculty/:id/approve</text>
  <text x="953" y="500" text-anchor="middle" font-size="8" fill="#6ee7b7">DELETE /faculty/:id</text>

  <!-- Business logic notes -->
  <rect x="46" y="534" width="1008" height="76" rx="6" fill="#022c22" stroke="#065f46" stroke-width="1"/>
  <text x="56" y="552" font-size="10" font-weight="600" fill="#6ee7b7">Business Logic (requests route):</text>
  <text x="56" y="566" font-size="9" fill="#a7f3d0">  · Accept/Reject guard: max_teams capacity check before accept  ·  Auto-reject other pending requests on accept</text>
  <text x="56" y="580" font-size="9" fill="#a7f3d0">  · Cascade notifications: student_notifications row inserted on every status change</text>
  <text x="56" y="594" font-size="9" fill="#a7f3d0">  · Idempotent request send: INSERT OR REPLACE prevents duplicate rows  ·  preferred_faculty_id synced on send/accept/withdraw</text>

  <!-- Arrow middleware to router -->
  <line x1="256" y1="470" x2="276" y2="470" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════ DB LAYER ═══════════════ -->
  <rect x="30" y="642" width="1040" height="162" rx="12" fill="url(#dbGrad)" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="642" width="310" height="28" rx="8" fill="#6d28d9" opacity="0.7"/>
  <text x="46" y="661" font-size="12" font-weight="700" fill="#ede9fe" letter-spacing="1">DATABASE — SQLite · better-sqlite3 (guide_allocation.db)</text>

  <!-- Tables -->
  <rect x="46" y="680" width="160" height="112" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="1"/>
  <rect x="46" y="680" width="160" height="22" rx="6" fill="#6d28d9" opacity="0.8"/>
  <text x="126" y="695" text-anchor="middle" font-size="10" font-weight="700" fill="#ddd6fe">students</text>
  <text x="56" y="714" font-size="8.5" fill="#c4b5fd">id · name · email · student_id</text>
  <text x="56" y="726" font-size="8.5" fill="#c4b5fd">password_hash · interests</text>
  <text x="56" y="738" font-size="8.5" fill="#c4b5fd">preferred_faculty_id (FK)</text>
  <text x="56" y="750" font-size="8.5" fill="#c4b5fd">project_title · tech_stack</text>
  <text x="56" y="762" font-size="8.5" fill="#c4b5fd">project_description</text>
  <text x="56" y="778" font-size="8.5" fill="#818cf8">created_at DATETIME</text>

  <rect x="218" y="680" width="160" height="112" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="1"/>
  <rect x="218" y="680" width="160" height="22" rx="6" fill="#6d28d9" opacity="0.8"/>
  <text x="298" y="695" text-anchor="middle" font-size="10" font-weight="700" fill="#ddd6fe">faculty</text>
  <text x="228" y="714" font-size="8.5" fill="#c4b5fd">id · name · email · department</text>
  <text x="228" y="726" font-size="8.5" fill="#c4b5fd">domain · password_hash</text>
  <text x="228" y="738" font-size="8.5" fill="#c4b5fd">approved INTEGER (0/1)</text>
  <text x="228" y="750" font-size="8.5" fill="#c4b5fd">max_teams INTEGER</text>
  <text x="228" y="778" font-size="8.5" fill="#818cf8">created_at DATETIME</text>

  <rect x="390" y="680" width="188" height="112" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="1"/>
  <rect x="390" y="680" width="188" height="22" rx="6" fill="#6d28d9" opacity="0.8"/>
  <text x="484" y="695" text-anchor="middle" font-size="10" font-weight="700" fill="#ddd6fe">requests</text>
  <text x="400" y="714" font-size="8.5" fill="#c4b5fd">id · student_id (FK)</text>
  <text x="400" y="726" font-size="8.5" fill="#c4b5fd">faculty_id (FK)</text>
  <text x="400" y="738" font-size="8.5" fill="#c4b5fd">status: pending/accepted/rejected</text>
  <text x="400" y="750" font-size="8.5" fill="#c4b5fd">UNIQUE(student_id, faculty_id)</text>
  <text x="400" y="778" font-size="8.5" fill="#818cf8">created_at DATETIME</text>

  <rect x="590" y="680" width="200" height="112" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="1"/>
  <rect x="590" y="680" width="200" height="22" rx="6" fill="#6d28d9" opacity="0.8"/>
  <text x="690" y="695" text-anchor="middle" font-size="10" font-weight="700" fill="#ddd6fe">notifications (faculty)</text>
  <text x="600" y="714" font-size="8.5" fill="#c4b5fd">id · faculty_id (FK)</text>
  <text x="600" y="726" font-size="8.5" fill="#c4b5fd">message TEXT</text>
  <text x="600" y="738" font-size="8.5" fill="#c4b5fd">read INTEGER (0/1)</text>
  <text x="600" y="778" font-size="8.5" fill="#818cf8">created_at DATETIME</text>

  <rect x="802" y="680" width="252" height="112" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="1"/>
  <rect x="802" y="680" width="252" height="22" rx="6" fill="#6d28d9" opacity="0.8"/>
  <text x="928" y="695" text-anchor="middle" font-size="10" font-weight="700" fill="#ddd6fe">student_notifications</text>
  <text x="812" y="714" font-size="8.5" fill="#c4b5fd">id · student_id (FK)</text>
  <text x="812" y="726" font-size="8.5" fill="#c4b5fd">message TEXT</text>
  <text x="812" y="738" font-size="8.5" fill="#c4b5fd">read INTEGER (0/1)</text>
  <text x="812" y="778" font-size="8.5" fill="#818cf8">created_at DATETIME</text>

  <!-- Arrow backend to DB -->
  <line x1="550" y1="622" x2="550" y2="642" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>

  <!-- Legend -->
  <rect x="46" y="792" width="12" height="8" rx="2" fill="#3b82f6" opacity="0.7"/>
  <text x="62" y="800" font-size="9" fill="#94a3b8">Frontend</text>
  <rect x="130" y="792" width="12" height="8" rx="2" fill="#10b981" opacity="0.7"/>
  <text x="146" y="800" font-size="9" fill="#94a3b8">Backend</text>
  <rect x="210" y="792" width="12" height="8" rx="2" fill="#7c3aed" opacity="0.7"/>
  <text x="226" y="800" font-size="9" fill="#94a3b8">Database</text>
  <line x1="290" y1="796" x2="314" y2="796" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="318" y="800" font-size="9" fill="#94a3b8">HTTP/Data flow</text>
</svg>
